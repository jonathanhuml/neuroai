brain_model_name: NtZuna
data:
  # Default batch_size (64) OOMs ZUNA on an 80GB H100 (needs ~87GB); 16 fits.
  batch_size: 16
  neuro:
    drop_bads: True
    notch_filter: 50.0
    filter: null
    frequency: 256.0
    baseline: null
    # ZUNA's exact eval normalization is average reference, per-channel
    # time-axis z-score, divide by 10, then clamp to +/-1.  The generic
    # extractor/on-the-fly scaler cannot average-reference in that order, so
    # NtZuna applies this normalization before tokenizing.
    scaler: null
    scale_factor: null
    clamp: null
  channel_positions:
    n_spatial_dims: 3
    normalize: false
    include_ref_eeg: false
brain_model_config:
  =replace=: true
  name: NtZuna
  checkpoint_path: /data/groups/bci/checkpoints/bci/ZUNA2_5e-4/checkpoints/0000052500
  num_fine_time_pts: 32
  data_norm: 10.0
  data_clip: 1.0
  do_avg_ref: true
  num_bins_discretize_xyz_chan_pos: 100
  channel_position_montage: standard_1005
  invalid_channel_position: -0.1
  # Temporary frontend verification. The decoder is kept outside the benchmark
  # module tree, runs on the real sample used for model initialization, then is freed.
  port_check_enabled: true
  port_check_output_dir: /data/groups/bci/jonhuml/workspace/neuroai/check_neuroai_port
  port_check_sample_steps: 50
  port_check_cfg: 1.0
  port_check_min_batch_size: 1
  port_check_mask_channels: 5
downstream_model_wrapper:
  model_output_key: null
  aggregation: mean
  layers_to_unfreeze: [""]
  probe_config: linear

# ZUNA config mirrors AY2latent/lingua/apps/AY2latent_bci/configs/config_bci_eval.yaml.
