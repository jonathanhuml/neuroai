brain_model_name: NtZuna
data:
  # Use more optimizer updates per epoch for full-model fine-tuning.
  batch_size: 16
  neuro:
    drop_bads: True
    notch_filter: 50.0
    filter: null
    frequency: 256.0
    baseline: null
    # ZUNA's exact eval normalization is average reference, per-channel
    # time-axis z-score, divide by 10, then clamp to +/-1.  The generic
    # extractor/on-the-fly scaler cannot average-reference in that order, so
    # NtZuna applies this normalization before tokenizing.
    scaler: null
    scale_factor: null
    clamp: null
  channel_positions:
    n_spatial_dims: 3
    normalize: false
    include_ref_eeg: false
trainer_config:
  log_every_n_steps: 1
  n_epochs: 100
  # OneCycle warms up for 10% of training, so patience must exceed 10 epochs.
  patience: 15
lightning_optimizer_config:
  optimizer:
    lr: 1.0e-5
  scheduler:
    kwargs:
      max_lr: 1.0e-5
# Persist train/validation metrics and the OneCycle learning rate locally.
csv_config: {}
brain_model_config:
  =replace=: true
  name: NtZuna
  checkpoint_path: /data/groups/bci/checkpoints/bci/ZUNA2_5e-4/checkpoints/0000052500
  num_fine_time_pts: 32
  data_norm: 10.0
  data_clip: 1.0
  do_avg_ref: true
  num_bins_discretize_xyz_chan_pos: 100
  channel_position_montage: standard_1005
  invalid_channel_position: -0.1
  debug_mode: false
downstream_model_wrapper:
  model_output_key: null
  aggregation: mean
  probe_config: linear

# ZUNA config mirrors AY2latent/lingua/apps/AY2latent_bci/configs/config_bci_eval.yaml.
